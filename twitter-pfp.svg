<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- Cream background -->
  <rect width="400" height="400" fill="#F5EDD8" rx="0"/>

  <!-- Subtle warm gradient -->
  <radialGradient id="bg-glow" cx="50%" cy="42%" r="55%">
    <stop offset="0%" stop-color="#FAEFD8"/>
    <stop offset="100%" stop-color="#EDE0C0"/>
  </radialGradient>
  <rect width="400" height="400" fill="url(#bg-glow)"/>

  <!-- Drop shadow for mascot -->
  <ellipse cx="200" cy="318" rx="72" ry="14" fill="#D4C4A0" opacity="0.5"/>

  <!-- Body -->
  <circle cx="200" cy="205" r="100" fill="#E8733A"/>

  <!-- Body shine -->
  <ellipse cx="175" cy="160" rx="28" ry="18" fill="#F0956A" opacity="0.4"/>

  <!-- Antennae stems -->
  <rect x="163" y="83" width="14" height="48" rx="7" fill="#E8733A"/>
  <rect x="223" y="83" width="14" height="48" rx="7" fill="#E8733A"/>

  <!-- Antennae tips -->
  <circle cx="170" cy="76" r="16" fill="#E8733A"/>
  <circle cx="230" cy="76" r="16" fill="#E8733A"/>
  <!-- Antennae tip shine -->
  <circle cx="165" cy="70" r="5" fill="#F0956A" opacity="0.6"/>
  <circle cx="225" cy="70" r="5" fill="#F0956A" opacity="0.6"/>

  <!-- Arms -->
  <circle cx="86" cy="215" r="22" fill="#E8733A"/>
  <circle cx="314" cy="215" r="22" fill="#E8733A"/>

  <!-- Legs -->
  <rect x="168" y="294" width="20" height="34" rx="10" fill="#E8733A"/>
  <rect x="212" y="294" width="20" height="34" rx="10" fill="#E8733A"/>

  <!-- Feet -->
  <ellipse cx="178" cy="330" rx="14" ry="8" fill="#D4601A"/>
  <ellipse cx="222" cy="330" rx="14" ry="8" fill="#D4601A"/>

  <!-- Eye whites -->
  <circle cx="172" cy="195" r="28" fill="#FFFFFF"/>
  <circle cx="228" cy="195" r="28" fill="#FFFFFF"/>

  <!-- Iris -->
  <circle cx="172" cy="195" r="20" fill="#00CDB0"/>
  <circle cx="228" cy="195" r="20" fill="#00CDB0"/>

  <!-- Pupils -->
  <circle cx="177" cy="200" r="10" fill="#00403A"/>
  <circle cx="233" cy="200" r="10" fill="#00403A"/>

  <!-- Eye shine -->
  <circle cx="181" cy="192" r="4.5" fill="white" opacity="0.9"/>
  <circle cx="237" cy="192" r="4.5" fill="white" opacity="0.9"/>
  <circle cx="172" cy="203" r="2" fill="white" opacity="0.5"/>
  <circle cx="228" cy="203" r="2" fill="white" opacity="0.5"/>

  <!-- Smile -->
  <path d="M183 228 Q200 244 217 228" stroke="#D4601A" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Brand text -->
  <text x="200" y="370" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="26" fill="#1A1208" text-anchor="middle" letter-spacing="0.5">MyClawAgent</text>
  <text x="200" y="392" font-family="'Arial Black', Arial, sans-serif" font-weight="800" font-size="15" fill="#E8733A" text-anchor="middle" letter-spacing="3">.IO</text>
</svg>
