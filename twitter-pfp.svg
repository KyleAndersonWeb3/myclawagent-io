<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- Background -->
  <rect width="400" height="400" fill="#080706"/>
  <!-- Subtle orange radial glow -->
  <radialGradient id="glow" cx="50%" cy="45%" r="50%">
    <stop offset="0%" stop-color="#E8733A" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#080706" stop-opacity="0"/>
  </radialGradient>
  <rect width="400" height="400" fill="url(#glow)"/>

  <!-- Mascot body -->
  <circle cx="200" cy="210" r="105" fill="#D93B2B"/>

  <!-- Antennae -->
  <circle cx="170" cy="82" r="18" fill="#D93B2B"/>
  <circle cx="230" cy="82" r="18" fill="#D93B2B"/>
  <rect x="162" y="82" width="16" height="52" rx="8" fill="#D93B2B"/>
  <rect x="222" y="82" width="16" height="52" rx="8" fill="#D93B2B"/>

  <!-- Arms -->
  <circle cx="82" cy="218" r="24" fill="#D93B2B"/>
  <circle cx="318" cy="218" r="24" fill="#D93B2B"/>

  <!-- Legs -->
  <rect x="168" y="302" width="22" height="36" rx="11" fill="#D93B2B"/>
  <rect x="210" y="302" width="22" height="36" rx="11" fill="#D93B2B"/>

  <!-- Eye glow -->
  <circle cx="172" cy="200" r="34" fill="#00E5CC" opacity="0.2"/>
  <circle cx="228" cy="200" r="34" fill="#00E5CC" opacity="0.2"/>

  <!-- Eyes -->
  <circle cx="172" cy="200" r="26" fill="#00E5CC"/>
  <circle cx="228" cy="200" r="26" fill="#00E5CC"/>

  <!-- Pupils -->
  <circle cx="178" cy="206" r="11" fill="#003D35"/>
  <circle cx="234" cy="206" r="11" fill="#003D35"/>

  <!-- Eye shine -->
  <circle cx="182" cy="197" r="5" fill="white" opacity="0.85"/>
  <circle cx="238" cy="197" r="5" fill="white" opacity="0.85"/>

  <!-- Brand text -->
  <text x="200" y="368" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="28" fill="#F5EDD8" text-anchor="middle" letter-spacing="1">MyClawAgent</text>
  <text x="200" y="392" font-family="Arial, sans-serif" font-weight="700" font-size="16" fill="#E8733A" text-anchor="middle" letter-spacing="2">.io</text>
</svg>
