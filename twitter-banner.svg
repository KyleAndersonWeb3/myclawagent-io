<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500">
  <defs>
    <radialGradient id="rg1" cx="72%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#E8733A" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0A0806" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rg2" cx="18%" cy="75%" r="38%">
      <stop offset="0%" stop-color="#E8733A" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0A0806" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Full dark background -->
  <rect width="1500" height="500" fill="#0A0806"/>
  <rect width="1500" height="500" fill="url(#rg1)"/>
  <rect width="1500" height="500" fill="url(#rg2)"/>

  <!-- Grid -->
  <g stroke="#E8733A" stroke-width="0.4" opacity="0.07">
    <line x1="0" y1="125" x2="1500" y2="125"/>
    <line x1="0" y1="250" x2="1500" y2="250"/>
    <line x1="0" y1="375" x2="1500" y2="375"/>
    <line x1="375" y1="0" x2="375" y2="500"/>
    <line x1="750" y1="0" x2="750" y2="500"/>
    <line x1="1125" y1="0" x2="1125" y2="500"/>
  </g>

  <!-- Rising chart line -->
  <polyline points="40,470 170,430 290,400 400,360 510,318 620,272 720,232 810,195 900,162 990,132 1080,105 1160,82 1240,62" fill="none" stroke="#E8733A" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)" opacity="0.75"/>
  <polyline points="40,488 170,452 290,424 400,386 510,346 620,302 720,264 810,229 900,199 990,170 1080,144 1160,122 1240,104" fill="none" stroke="#E8733A" stroke-width="1" stroke-dasharray="7,9" stroke-linecap="round" opacity="0.2"/>

  <!-- Hollow claw markers at chart points -->
  <g fill="none" stroke="#E8733A" stroke-width="1.8" stroke-linecap="round" filter="url(#glow)">
    <path d="M396,352 C392,344 385,341 380,343 C375,346 375,353 379,357 C383,361 393,358 396,352Z" opacity="0.8"/>
    <path d="M404,352 C408,344 415,341 420,343 C425,346 425,353 421,357 C417,361 407,358 404,352Z" opacity="0.8"/>
    <path d="M616,264 C612,256 605,253 600,255 C595,258 595,265 599,269 C603,273 613,270 616,264Z" opacity="0.85"/>
    <path d="M624,264 C628,256 635,253 640,255 C645,258 645,265 641,269 C637,273 627,270 624,264Z" opacity="0.85"/>
    <path d="M806,187 C802,179 795,176 790,178 C785,181 785,188 789,192 C793,196 803,193 806,187Z" opacity="0.9"/>
    <path d="M814,187 C818,179 825,176 830,178 C835,181 835,188 831,192 C827,196 817,193 814,187Z" opacity="0.9"/>
    <path d="M986,124 C982,116 975,113 970,115 C965,118 965,125 969,129 C973,133 983,130 986,124Z" opacity="0.95"/>
    <path d="M994,124 C998,116 1005,113 1010,115 C1015,118 1015,125 1011,129 C1007,133 997,130 994,124Z" opacity="0.95"/>
    <path d="M1236,54 C1232,46 1225,43 1220,45 C1215,48 1215,55 1219,59 C1223,63 1233,60 1236,54Z" opacity="1"/>
    <path d="M1244,54 C1248,46 1255,43 1260,45 C1265,48 1265,55 1261,59 C1257,63 1247,60 1244,54Z" opacity="1"/>
  </g>

  <!-- HOLLOW MASCOT — right side -->
  <g transform="translate(1215, 95) scale(0.72)" fill="none" filter="url(#glow)">
    <!-- Body -->
    <circle cx="175" cy="215" r="160" stroke="#E8733A" stroke-width="2.8" opacity="0.85"/>
    <circle cx="175" cy="215" r="142" stroke="#E8733A" stroke-width="0.7" stroke-dasharray="10,8" opacity="0.2"/>
    <!-- Scan lines -->
    <line x1="30" y1="172" x2="320" y2="172" stroke="#E8733A" stroke-width="0.8" opacity="0.15"/>
    <line x1="18" y1="215" x2="332" y2="215" stroke="#E8733A" stroke-width="0.8" opacity="0.15"/>
    <line x1="30" y1="258" x2="320" y2="258" stroke="#E8733A" stroke-width="0.8" opacity="0.15"/>
    <!-- Antennae -->
    <line x1="148" y1="58" x2="130" y2="16" stroke="#E8733A" stroke-width="2.2" opacity="0.9"/>
    <circle cx="126" cy="8" r="11" stroke="#E8733A" stroke-width="2.2" opacity="0.9"/>
    <circle cx="126" cy="8" r="3.5" fill="#E8733A" opacity="0.65"/>
    <line x1="202" y1="58" x2="220" y2="16" stroke="#E8733A" stroke-width="2.2" opacity="0.9"/>
    <circle cx="224" cy="8" r="11" stroke="#E8733A" stroke-width="2.2" opacity="0.9"/>
    <circle cx="224" cy="8" r="3.5" fill="#E8733A" opacity="0.65"/>
    <!-- Arms -->
    <circle cx="4" cy="222" r="26" stroke="#E8733A" stroke-width="2.2" opacity="0.75"/>
    <circle cx="346" cy="222" r="26" stroke="#E8733A" stroke-width="2.2" opacity="0.75"/>
    <!-- Legs -->
    <rect x="142" y="368" width="18" height="38" rx="9" stroke="#E8733A" stroke-width="2" opacity="0.8"/>
    <rect x="195" y="368" width="18" height="38" rx="9" stroke="#E8733A" stroke-width="2" opacity="0.8"/>
    <!-- Eyes teal -->
    <circle cx="138" cy="200" r="34" stroke="#00CDB0" stroke-width="2.5" opacity="0.9"/>
    <circle cx="212" cy="200" r="34" stroke="#00CDB0" stroke-width="2.5" opacity="0.9"/>
    <circle cx="138" cy="200" r="19" stroke="#00CDB0" stroke-width="1.5" opacity="0.45"/>
    <circle cx="212" cy="200" r="19" stroke="#00CDB0" stroke-width="1.5" opacity="0.45"/>
    <circle cx="138" cy="200" r="6" fill="#00CDB0" opacity="0.8"/>
    <circle cx="212" cy="200" r="6" fill="#00CDB0" opacity="0.8"/>
    <!-- Orbit ring -->
    <ellipse cx="175" cy="215" rx="192" ry="38" stroke="#E8733A" stroke-width="0.9" stroke-dasharray="14,10" opacity="0.18"/>
  </g>

  <!-- LEFT: brand text — scaled to fit -->
  <text x="55" y="128" font-family="'Arial Black','Helvetica Neue',Arial,sans-serif" font-weight="900" font-size="75" fill="#F5EDD8" letter-spacing="-2">MyClawAgent</text>
  <text x="55" y="190" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="50" fill="#E8733A" letter-spacing="3">.IO</text>

  <!-- Divider -->
  <rect x="55" y="208" width="420" height="2" fill="#E8733A" opacity="0.45" rx="1"/>

  <!-- Tagline -->
  <text x="55" y="244" font-family="Arial,sans-serif" font-weight="600" font-size="21" fill="#F5EDD8" opacity="0.58" letter-spacing="0.3">The AI Agent That Actually Works For You.</text>

  <!-- Stats -->
  <text x="55" y="298" font-family="Arial,sans-serif" font-weight="800" font-size="17" fill="#E8733A" letter-spacing="0.5">24/7 ACTIVE</text>
  <text x="55" y="318" font-family="Arial,sans-serif" font-size="13" fill="#F5EDD8" opacity="0.38">Always on. Never sleeps.</text>

  <text x="240" y="298" font-family="Arial,sans-serif" font-weight="800" font-size="17" fill="#E8733A" letter-spacing="0.5">SAME DAY LIVE</text>
  <text x="240" y="318" font-family="Arial,sans-serif" font-size="13" fill="#F5EDD8" opacity="0.38">Up and running fast.</text>

  <text x="455" y="298" font-family="Arial,sans-serif" font-weight="800" font-size="17" fill="#E8733A" letter-spacing="0.5">ZERO TECH</text>
  <text x="455" y="318" font-family="Arial,sans-serif" font-size="13" fill="#F5EDD8" opacity="0.38">We handle everything.</text>

  <!-- Bottom bar -->
  <rect x="0" y="466" width="1500" height="34" fill="#E8733A" opacity="0.06"/>
  <rect x="0" y="464" width="1500" height="2.5" fill="#E8733A" opacity="0.28"/>
  <text x="750" y="486" font-family="Arial,sans-serif" font-weight="700" font-size="12" fill="#E8733A" opacity="0.45" text-anchor="middle" letter-spacing="4">MYCLAWAGENT.IO — AI AGENTS BUILT AND MANAGED FOR YOU</text>

  <!-- Side accent -->
  <rect x="0" y="0" width="3" height="500" fill="#E8733A" opacity="0.4"/>
  <path d="M0,0 L50,0 L0,50Z" fill="#E8733A" opacity="0.1"/>
  <path d="M1500,500 L1450,500 L1500,450Z" fill="#E8733A" opacity="0.1"/>
</svg>
