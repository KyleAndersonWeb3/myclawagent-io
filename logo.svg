<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="36" height="36">
  <!-- Body -->
  <circle cx="32" cy="36" r="22" fill="#D93B2B"/>
  <!-- Antennae -->
  <circle cx="24" cy="10" r="4" fill="#D93B2B"/>
  <circle cx="40" cy="10" r="4" fill="#D93B2B"/>
  <rect x="22" y="10" width="4" height="12" rx="2" fill="#D93B2B"/>
  <rect x="38" y="10" width="4" height="12" rx="2" fill="#D93B2B"/>
  <!-- Arms -->
  <circle cx="8" cy="38" r="5" fill="#D93B2B"/>
